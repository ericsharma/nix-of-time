services:
  koito:
    image: gabehf/koito:latest
    container_name: koito
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    ports:
      - "4110:4110"
    volumes:
      - /srv/koito/data:/etc/koito
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: koito-db
    restart: unless-stopped
    volumes:
      - /srv/koito/db:/var/lib/postgresql/data
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d koitodb"]
      interval: 5s
      timeout: 5s
      retries: 5
